services:
  postgres:
    image: postgres:16
    container_name: deckgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend
    container_name: deckgen-backend-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - app_storage:/app/storage

  backend-worker:
    build:
      context: ./backend
    container_name: deckgen-backend-worker
    restart: unless-stopped
    command: python worker.py
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: deckgen-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend-api

  nginx:
    image: nginx:1.27-alpine
    container_name: deckgen-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend-api
    ports:
      - "80:80"
    volumes:
      - app_storage:/app/storage

volumes:
  postgres_data:
  app_storage:
